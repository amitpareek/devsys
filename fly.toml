# devsys — deploy to Fly.io as an always-on tailnet dev box.
#
# Model: one fly Machine, one volume at /root, reachable only over your
# tailnet (no public fly edge routing). Costs are ~$1.94/mo for a
# shared-cpu-1x + 10GB volume in most regions.
#
# ─── Easiest: run ./flysetup.sh ────────────────────────────────────
# Prompts for org / hostname / region / volume size / TS_AUTHKEY, patches
# this file, and runs every fly command below in sequence.
#
# ─── Manual ─────────────────────────────────────────────────────────
#   1. Edit `app` + `HOSTNAME` + volume source below.
#   2. fly apps create <app-name>
#   3. fly volumes create <vol-name> --size 10 --region <region>
#   4. fly secrets set TS_AUTHKEY=tskey-auth-xxxxxxxx
#   5. fly deploy --ha=false --now
#
# ─── Day-to-day ─────────────────────────────────────────────────────
#   tailscale ssh root@<hostname>     # from any tailnet device
#   fly logs                          # follow container stdout
#   fly ssh console                   # break-glass root shell
#   fly machine restart <id>          # reload entrypoint / image pull

app            = "CHANGE-ME-devsys"
primary_region = "ams"                     # see `fly platform regions`

[build]
  image = "ghcr.io/amitpareek/devsys:latest"

[env]
  # Short tailnet name (independent of the globally-unique fly `app`).
  # Pattern: the fly app is `<org>-devsys-<hostname>`; HOSTNAME is just
  # the `<hostname>` part, so you reach the box as `tailscale ssh
  # root@<hostname>`.
  HOSTNAME = "CHANGE-ME-devsys"

# Single persistence volume. Shell history, tailscale state, AI auth,
# redis data, ~/work files — everything lives here. Destroying it resets
# the box.
[[mounts]]
  source       = "devsys_home"        # flysetup.sh rewrites this to devsys_<hostname>_vol
  destination  = "/root"
  initial_size = "10gb"

# One always-running machine. No auto-stop: a dev box should be reachable
# whenever you ssh in. Bump memory if you hit OOMs with heavy builds.
[[vm]]
  size   = "shared-cpu-1x"
  memory = "2gb"

# No [[services]] block: the container isn't exposed on fly's public
# edge. All access is through tailscale SSH (or `fly ssh console` as a
# break-glass). Don't open ports here.

[deploy]
  strategy = "immediate"

[[restart]]
  policy = "always"
