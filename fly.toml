# devsys — deploy to Fly.io as an always-on tailnet dev box.
#
# Model: one fly Machine, one volume at /home/dev, reachable only over
# your tailnet (no public fly edge routing). Costs are ~$1.94/mo for a
# shared-cpu-1x + 10GB volume in most regions.
#
# ─── One-time setup ─────────────────────────────────────────────────
#   1. Pick a unique app name and edit `app` + `HOSTNAME` below to match.
#   2. fly apps create <app-name>
#   3. fly volumes create devsys_home --size 10 --region <your-region>
#   4. fly secrets set TS_AUTHKEY=tskey-auth-xxxxxxxx
#   5. fly deploy
#
# ─── Day-to-day ─────────────────────────────────────────────────────
#   tailscale ssh dev@<app-name>           # from any tailnet device
#   fly logs                               # follow container stdout
#   fly machine restart <id>               # reload entrypoint (picks up
#                                          # newly pulled image tools)
#
# Bumping the image pulls ghcr.io/amitpareek/devsys:latest on next deploy.

app            = "personal-devsys-cksys"
primary_region = "bom"

[build]
  image = "ghcr.io/amitpareek/devsys:latest"

[env]
  # Kernel + tailnet hostname. Independent of `app` above — the fly app
  # name is globally unique (prefixed with org), but the tailnet name is
  # whatever short label you want (e.g. `cksys`, reachable as
  # `tailscale ssh dev@cksys`).
  HOSTNAME = "cksys"

# Single persistence volume. Shell history, tailscale state, AI auth,
# redis data, ~/work files — everything lives here. Destroying the
# volume resets the box.
[[mounts]]
  source       = "devsys_cksys_vol"
  destination  = "/home/dev"
  initial_size = "100gb"

# One always-running machine. No auto-stop: a dev box should be reachable
# whenever you ssh in. Bump memory if you hit OOMs with heavy builds.
[[vm]]
  size   = "shared-cpu-1x"
  memory = "2gb"

# No [[services]] block: the container isn't exposed on fly's public
# edge. All access is through tailscale SSH (or `fly ssh console` as a
# break-glass). Don't open ports here.

[deploy]
  # A rolling restart on deploy is fine; there's only one machine and
  # we're not serving traffic.
  strategy = "immediate"

[[restart]]
  policy = "always"
