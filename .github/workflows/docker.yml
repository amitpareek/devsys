name: build-and-push

on:
  push:
    branches: [main]
    # Only trigger when the image actually changes. README / fly.toml /
    # flysetup.sh / compose / .md edits should NOT publish a new image.
    paths:
      - Dockerfile
      - entrypoint.sh
      - .github/workflows/docker.yml
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/amitpareek/devsys

jobs:
  # ─── One job per architecture, on its NATIVE runner ──────────────────
  # arm64 native (`ubuntu-24.04-arm`) is ~5× faster than QEMU emulation
  # on an amd64 runner, which is the single biggest win here.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch:     amd64
            runner:   ubuntu-24.04
            platform: linux/amd64
          - arch:     arm64
            runner:   ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch cache scope so the two builds don't evict each other.
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to:   type=gha,scope=${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  # ─── Combine the per-arch images into a multi-arch manifest ──────────
  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest and push
        working-directory: /tmp/digests
        run: |
          set -e
          DIGESTS=""
          for f in *; do
            [ -f "$f" ] && DIGESTS="$DIGESTS ${{ env.IMAGE }}@$(cat "$f")"
          done
          echo "Combining: $DIGESTS"
          TAGS_ARGS=""
          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' '); do
            TAGS_ARGS="$TAGS_ARGS --tag $tag"
          done
          docker buildx imagetools create $TAGS_ARGS $DIGESTS

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:latest
