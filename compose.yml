# devsys — local Docker / OrbStack sample.
#
# Edit the three lines marked "← CHANGE" per container, then:
#   docker compose up -d
#
# Shell in:
#   docker exec -it <host> zsh         # lands in ~/work
#   tailscale ssh root@<host>          # once tailnet is joined
#
# ⚠  The TS_AUTHKEY sits in plaintext here. Don't commit this file
#    with real values — either gitignore it locally or move the key
#    to a .env file (see .env.example).
#
# YAML anchors (&name / *name) let us define each value once and
# reuse it — so the container name, `hostname`, and HOSTNAME env are
# all guaranteed to match.

services:

  # ── First container ────────────────────────────────────────────────
  dev1:
    image: ghcr.io/amitpareek/devsys:latest
    container_name: &host1 my-devbox                     # ← CHANGE: tailnet name
    hostname: *host1
    environment:
      HOSTNAME: *host1
      TS_AUTHKEY: tskey-auth-REPLACE-WITH-REUSABLE-KEY   # ← CHANGE: reusable tskey-auth-...
    volumes:
      - devsys-home-1:/root                              # ← CHANGE (optional): /abs/host/path to bind-mount instead
    restart: unless-stopped

  # ── Second container (uncomment to enable) ─────────────────────────
  # dev2:
  #   image: ghcr.io/amitpareek/devsys:latest
  #   container_name: &host2 my-second-box               # ← CHANGE
  #   hostname: *host2
  #   environment:
  #     HOSTNAME: *host2
  #     TS_AUTHKEY: tskey-auth-REPLACE-WITH-REUSABLE-KEY # ← CHANGE (can reuse same key)
  #   volumes:
  #     - devsys-home-2:/root                            # ← CHANGE (optional)
  #   restart: unless-stopped

volumes:
  devsys-home-1:
  # devsys-home-2:
