services:
  dev:
    image: devsys-base:latest
    container_name: customer-a-dev
    hostname: customer-a
    restart: unless-stopped

    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun

    volumes:
      # Code, edited from either side
      - ./work:/home/dev/work
      # Customer-A's Obsidian vault — BS
      - ./bsvault:/home/dev/vault
      # Persist tailscale identity across rebuilds
      - customer-a-tailscale:/var/lib/tailscale
      # Persist user data (mise installs, AI CLI auth, shell history, caches)
      - customer-a-home-local:/home/dev/.local
      - customer-a-home-config:/home/dev/.config
      - customer-a-home-cache:/home/dev/.cache
      - customer-a-home-claude:/home/dev/.claude
      - customer-a-home-npm:/home/dev/.npm-global
      - customer-a-home-bun:/home/dev/.bun
      # Redis data (only written to if redis is selected in setup.sh)
      - customer-a-redis:/var/lib/redis
      # Devsys state (tool selection + sentinel)
      - customer-a-devsys-state:/var/lib/devsys-setup

    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  customer-a-tailscale:
  customer-a-home-local:
  customer-a-home-config:
  customer-a-home-cache:
  customer-a-home-claude:
  customer-a-home-npm:
  customer-a-home-bun:
  customer-a-redis:
  customer-a-devsys-state:
